<!DOCTYPE html>
<html lang="ru">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
    <title>Secure Messenger</title>
    <link data-trunk rel="rust" data-target-name="messenger-client" data-wasm-opt="z"/>
    <link data-trunk rel="css" href="style/built.css"/>
    <link data-trunk rel="icon" href="public/favicon.png"/>
    <!-- Vendored ffmpeg.wasm (esm build) for client-side media transcoding. The
         FFmpeg class is imported lazily by the module script below; the 32MB
         core wasm is only fetched the first time a video is compressed. -->
    <link data-trunk rel="copy-dir" href="public/ffmpeg"/>
    <!-- Hardware video transcode (WebCodecs) — fast path; ffmpeg.wasm is the
         software fallback when the browser can't decode the input codec. -->
    <link data-trunk rel="copy-dir" href="public/webcodecs"/>
  </head>
  <body class="h-full">
    <script>
      // MediaSource streaming driver for chunked-encrypted voice/video. Rust
      // (WASM) owns the crypto: it Range-fetches each encrypted chunk, decrypts
      // it, and hands the plaintext here; this code feeds it to a SourceBuffer so
      // playback starts on the first chunk. Backpressure: push() resolves only
      // after the append's `updateend`, so Rust appends one chunk at a time.
      (function () {
        function supported(mime) {
          try {
            return !!(window.MediaSource && window.MediaSource.isTypeSupported(mime));
          } catch (_) {
            return false;
          }
        }
        function start(el, mime) {
          var ms = new MediaSource();
          var handle = { ms: ms, sb: null, mime: mime };
          handle.open = new Promise(function (resolve, reject) {
            ms.addEventListener("sourceopen", function () {
              try {
                // Revoke the object URL once consumed to avoid leaks.
                if (handle.url) { URL.revokeObjectURL(handle.url); handle.url = null; }
                handle.sb = ms.addSourceBuffer(mime);
                resolve();
              } catch (e) { reject(e); }
            }, { once: true });
          });
          handle.url = URL.createObjectURL(ms);
          el.src = handle.url;
          return handle;
        }
        function push(handle, data) {
          return handle.open.then(function () {
            return new Promise(function (resolve, reject) {
              var sb = handle.sb;
              function cleanup() {
                sb.removeEventListener("updateend", onEnd);
                sb.removeEventListener("error", onErr);
              }
              function onEnd() { cleanup(); resolve(); }
              function onErr() { cleanup(); reject(new Error("appendBuffer error")); }
              sb.addEventListener("updateend", onEnd);
              sb.addEventListener("error", onErr);
              try {
                sb.appendBuffer(data);
              } catch (e) { cleanup(); reject(e); }
            });
          });
        }
        function end(handle) {
          try {
            if (handle.ms.readyState === "open") handle.ms.endOfStream();
          } catch (_) {}
        }
        window.__sigilStreamSupported = supported;
        window.__sigilStreamStart = start;
        window.__sigilStreamPush = push;
        window.__sigilStreamEnd = end;
      })();
    </script>
    <script>
      // Client-side media normalization for the "send as Media" path (Telegram
      // style). Everything runs locally so end-to-end encryption is preserved —
      // the server never sees plaintext. Video → H.264 Main@4.0 + AAC in a
      // FRAGMENTED mp4 so it streams through the __sigilStream MSE driver above;
      // images → downscaled JPEG. Both cap the long side and re-encode.
      (function () {
        // Long side cap (px) and JPEG quality for the image compression path.
        var IMAGE_MAX_LONG = 1920;
        var IMAGE_QUALITY = 0.82;

        // Video transcoding (ffmpeg.wasm) lives in the ES-module script below —
        // it needs `import` to pull the FFmpeg class. This classic block only
        // owns image compression, which needs no module loading.

        // Downscale + re-encode an image to JPEG via a canvas. Returns
        // { bytes: Uint8Array, mime: "image/jpeg" }. Strips EXIF as a side effect.
        window.__sigilCompressImage = async function (input, mime) {
          var blob = new Blob([input], { type: mime || "image/*" });
          var url = URL.createObjectURL(blob);
          try {
            var bmp = await createImageBitmap(blob);
            var w = bmp.width,
              h = bmp.height;
            var scale = Math.min(1, IMAGE_MAX_LONG / Math.max(w, h));
            var ow = Math.max(1, Math.round(w * scale));
            var oh = Math.max(1, Math.round(h * scale));
            var canvas =
              typeof OffscreenCanvas !== "undefined"
                ? new OffscreenCanvas(ow, oh)
                : Object.assign(document.createElement("canvas"), {
                    width: ow,
                    height: oh,
                  });
            var ctx = canvas.getContext("2d");
            ctx.drawImage(bmp, 0, 0, ow, oh);
            bmp.close && bmp.close();
            var outBlob = canvas.convertToBlob
              ? await canvas.convertToBlob({
                  type: "image/jpeg",
                  quality: IMAGE_QUALITY,
                })
              : await new Promise(function (res) {
                  canvas.toBlob(res, "image/jpeg", IMAGE_QUALITY);
                });
            var buf = await outBlob.arrayBuffer();
            return { bytes: new Uint8Array(buf), mime: "image/jpeg" };
          } finally {
            URL.revokeObjectURL(url);
          }
        };
      })();
    </script>
    <script type="module">
      // Video transcoding via the ffmpeg.wasm ESM build. Loaded as a module so
      // the worker (./esm/worker.js) is itself a module and pulls the core via
      // dynamic import(). The 32 MB core wasm is fetched lazily on first use.
      import { FFmpeg } from "./ffmpeg/esm/index.js";

      var VIDEO_MAX_LONG = 1280; // long-side cap (px); bump to 1920 for 1080p
      var VIDEO_BITRATE_K = 2500;
      var ff = null; // reused FFmpeg instance

      // Forced codec/level (Main@4.0 + AAC-LC) so MediaSource.isTypeSupported
      // passes on every platform.
      window.__sigilVideoMime = 'video/mp4; codecs="avc1.4D4028, mp4a.40.2"';

      // Hardware path (WebCodecs, in a worker). Resolves { bytes, mime } or
      // rejects (caller then falls back to the ffmpeg.wasm software path below).
      window.__sigilTranscodeVideoHW = function (input, onProgress) {
        return new Promise(function (resolve, reject) {
          if (typeof VideoEncoder === "undefined" || typeof VideoDecoder === "undefined") {
            reject(new Error("webcodecs-unavailable"));
            return;
          }
          var url = new URL("webcodecs/transcode-worker.js", document.baseURI).href;
          var w = new Worker(url);
          w.onmessage = function (e) {
            var d = e.data;
            if (d.type === "progress") {
              if (onProgress) onProgress(d.value);
            } else if (d.type === "done") {
              w.terminate();
              resolve({ bytes: new Uint8Array(d.buffer), mime: d.mime });
            } else if (d.type === "error") {
              w.terminate();
              reject(new Error(d.message));
            }
          };
          w.onerror = function (ev) {
            w.terminate();
            reject(new Error("worker: " + (ev.message || "error")));
          };
          // Transfer the input buffer so it isn't copied across the thread boundary.
          var ab = input.buffer.slice(input.byteOffset, input.byteOffset + input.byteLength);
          w.postMessage({ buffer: ab, maxLong: VIDEO_MAX_LONG, bitrateK: VIDEO_BITRATE_K }, [ab]);
        });
      };

      // input: Uint8Array, onProgress: fn(0..1). Returns a Uint8Array (fragmented mp4).
      window.__sigilTranscodeVideo = async function (input, onProgress) {
        if (!ff) ff = new FFmpeg();
        if (!ff.loaded) {
          var abs = function (p) { return new URL(p, document.baseURI).href; };
          await ff.load({
            coreURL: abs("ffmpeg/core/ffmpeg-core.js"),
            wasmURL: abs("ffmpeg/core/ffmpeg-core.wasm"),
          });
        }
        var prog = null;
        if (onProgress) {
          prog = function (e) {
            var p = e && typeof e.progress === "number" ? e.progress : 0;
            if (p < 0) p = 0;
            if (p > 1) p = 1;
            onProgress(p);
          };
          ff.on("progress", prog);
        }
        try {
          await ff.writeFile("in", input);
          // Scale the LONG side to the cap, keep aspect, force even dims.
          var vf =
            "scale='if(gt(iw,ih),min(" + VIDEO_MAX_LONG +
            ",iw),-2)':'if(gt(iw,ih),-2,min(" + VIDEO_MAX_LONG + ",ih))'";
          await ff.exec([
            "-i", "in",
            "-vf", vf,
            "-c:v", "libx264",
            "-preset", "veryfast",
            "-profile:v", "main",
            "-level", "4.0",
            "-pix_fmt", "yuv420p",
            "-b:v", VIDEO_BITRATE_K + "k",
            "-maxrate", VIDEO_BITRATE_K + "k",
            "-bufsize", VIDEO_BITRATE_K * 2 + "k",
            "-c:a", "aac",
            "-b:a", "128k",
            "-ac", "2",
            "-movflags", "+frag_keyframe+empty_moov+default_base_moof",
            "-f", "mp4",
            "out.mp4",
          ]);
          var data = await ff.readFile("out.mp4");
          ff.deleteFile("in").catch(function () {});
          ff.deleteFile("out.mp4").catch(function () {});
          return data;
        } finally {
          if (prog) ff.off("progress", prog);
        }
      };
    </script>
  </body>
</html>
